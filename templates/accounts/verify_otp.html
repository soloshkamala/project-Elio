{% load static %}
<!DOCTYPE html>
<html lang="uk" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <script>
        (function() {
            const saved = localStorage.getItem('elio-theme') || 'light';
            document.documentElement.setAttribute('data-bs-theme', saved);
        })();
    </script>
    <title>Підтвердження пошти — Elio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root { --accent: #ff9a9e; --bg: #fdf6f0; }
        [data-bs-theme="dark"] { --bg: #1e1e2e; }

        body {
            background-color: var(--bg);
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 40px;
            border: 2px solid white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            max-width: 450px;
            width: 100%;
            animation: fadeIn 0.8s ease-out;
        }
        [data-bs-theme="dark"] .auth-card { background: #2b2b3d; border-color: #444; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-main {
            background: linear-gradient(45deg, #ff9a9e, #fad0c4);
            border: none; color: white; font-weight: 800;
            padding: 15px; border-radius: 20px; width: 100%;
            transition: 0.3s;
        }
        .btn-main:hover { transform: scale(1.02); box-shadow: 0 10px 20px rgba(255,154,158,0.4); }

        .mascot-head { width: 90px; margin-bottom: -45px; z-index: 5; position: relative; }

        .form-control {
            border-radius: 15px !important;
            padding: 15px !important;
            border: 2px solid #f0f0f0 !important;
        }
        [data-bs-theme="dark"] .form-control {
            background-color: #1e1e2e; border-color: #555 !important; color: white;
        }
        .form-control:focus { border-color: var(--accent) !important; box-shadow: none !important; }

        .theme-toggle {
            position: fixed; top: 20px; right: 20px;
            width: 50px; height: 50px; border-radius: 50%;
            background: white; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
            z-index: 1000;
        }
        [data-bs-theme="dark"] .theme-toggle { background: #444; color: white; }

        .otp-input {
            font-size: 2rem;
            letter-spacing: 15px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <button id="themeBtn" class="theme-toggle shadow-sm"><i class="bi bi-moon-fill"></i></button>

    <div class="container text-center">
        <img src="{% static 'mascot.png' %}" class="mascot-head" alt="Mascot">

        <div class="auth-card mx-auto text-start">
            <h2 class="fw-black text-center mb-3 mt-3">Перевірка пошти</h2>
            <p class="text-center text-muted small mb-4">
                Ми відправили 6-значний код на<br>
                <b style="color: var(--accent);">{{ email }}</b>
            </p>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger text-center border-0 shadow-sm" style="border-radius: 15px; font-weight: bold; font-size: 0.9rem;">
                        <i class="bi bi-exclamation-octagon me-1"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <input type="text" name="code" class="form-control otp-input" maxlength="6" placeholder="------" required autocomplete="off">
                </div>

                <button type="submit" class="btn btn-main mt-2 text-uppercase">ПІДТВЕРДИТИ</button>
            </form>

            <div class="text-center mt-4">
                <a href="{% url 'register' %}" class="btn btn-link text-decoration-none text-muted small">← Назад до реєстрації</a>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('themeBtn');
        const icon = btn.querySelector('i');
        const html = document.documentElement;

        function updateIcon(theme) { icon.className = theme === 'light' ? 'bi bi-moon-fill' : 'bi bi-sun-fill'; }

        btn.onclick = () => {
            const target = html.getAttribute('data-bs-theme') === 'light' ? 'dark' : 'light';
            html.setAttribute('data-bs-theme', target);
            localStorage.setItem('elio-theme', target);
            updateIcon(target);
        };
        updateIcon(localStorage.getItem('elio-theme') || 'light');

        const otpInput = document.querySelector('.otp-input');
        otpInput.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '');
        });
    </script>
</body>
</html>
