{% if messages %}
    <div id="global-modal-container" style="display: flex;">
        {% for message in messages %}
            <div class="elio-modal">
                <div class="modal-card {% if 'banned_popup' in message.tags %}border-red{% else %}border-blue{% endif %}">
                    <div class="modal-icon">
                        {% if 'banned_popup' in message.tags %}🚫{% else %}🔔{% endif %}
                    </div>
                    <h2>Доступ обмежено</h2>
                    <div class="modal-body">{{ message }}</div>
                    <button class="modal-btn" onclick="closeElioModal()">Зрозумів</button>
                </div>
            </div>
        {% endfor %}
    </div>

    <style>
        #global-modal-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px);
            align-items: center; justify-content: center; z-index: 10000;
        }
        .modal-card {
            background: #181818; color: white; padding: 40px; border-radius: 24px;
            text-align: center; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .border-red { border: 2px solid #ff4b2b; box-shadow: 0 0 20px rgba(255, 75, 43, 0.2); }
        .border-blue { border: 2px solid #3498db; }
        .modal-icon { font-size: 60px; margin-bottom: 20px; }
        .modal-body { margin-bottom: 30px; line-height: 1.6; color: #b3b3b3; font-size: 18px; }
        .modal-btn {
            background: #fff; color: #000; border: none; padding: 14px 40px;
            border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .modal-btn:hover { transform: scale(1.05); background: #eee; }
    </style>

    <script>
        function closeElioModal() {
            document.getElementById('global-modal-container').style.display = 'none';
        }
    </script>
{% endif %}
