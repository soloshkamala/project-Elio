{% load static %}
<!DOCTYPE html>
<html lang="uk" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <script>
        (function() {
            const saved = localStorage.getItem('elio-theme') || 'light';
            document.documentElement.setAttribute('data-bs-theme', saved);
        })();
    </script>
    <title>Заявка на розгляді — Elio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root { --accent: #7b61ff; --bg: #fdf6f0; }
        [data-bs-theme="dark"] { --bg: #1e1e2e; }

        body {
            background-color: var(--bg);
            font-family: 'Nunito', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .status-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 40px;
            border: 2px solid white;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            max-width: 500px;
            animation: fadeIn 0.8s ease-out;
        }
        [data-bs-theme="dark"] .status-card { background: #2b2b3d; border-color: #444; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-box {
            font-size: 4rem;
            color: var(--accent);
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .btn-logout {
            background: transparent;
            color: #dc3545;
            border: 2px solid #dc3545;
            border-radius: 30px;
            padding: 10px 30px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
            margin-top: 20px;
        }
        .btn-logout:hover { background: #dc3545; color: white; transform: translateY(-2px); }

        .theme-toggle {
            position: fixed; top: 20px; right: 20px;
            width: 50px; height: 50px; border-radius: 50%;
            background: white; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
            z-index: 1000;
        }
        [data-bs-theme="dark"] .theme-toggle { background: #444; color: white; }
    </style>
</head>
<body>

    <button id="themeBtn" class="theme-toggle shadow-sm"><i class="bi bi-moon-fill"></i></button>

    <div class="status-card">
        <div class="icon-box">
            <i class="bi bi-hourglass-split"></i>
        </div>
        <h2 class="fw-bold mb-3" style="color: var(--accent);">Заявка на розгляді</h2>
        <p class="text-muted mb-4 fs-5">
            Привіт, <b>{{ user.first_name|default:user.username }}</b>!<br>
            Ми отримали ваші документи. Наразі адміністратор перевіряє вашу заявку.
            Як тільки вас підтвердять, ви отримаєте доступ до робочого кабінету спеціаліста.
        </p>

        <!-- Кнопка виходу (робить POST-запит, як вимагає Django) -->
        <form action="{% url 'logout' %}" method="post">
            {% csrf_token %}
            <button type="submit" class="btn-logout">
                <i class="bi bi-box-arrow-right me-2"></i>Вийти з акаунту
            </button>
        </form>
    </div>

    <script>
        const btn = document.getElementById('themeBtn');
        const icon = btn.querySelector('i');
        const html = document.documentElement;

        function updateIcon(theme) { icon.className = theme === 'light' ? 'bi bi-moon-fill' : 'bi bi-sun-fill'; }

        btn.onclick = () => {
            const target = html.getAttribute('data-bs-theme') === 'light' ? 'dark' : 'light';
            html.setAttribute('data-bs-theme', target);
            localStorage.setItem('elio-theme', target);
            updateIcon(target);
        };
        updateIcon(localStorage.getItem('elio-theme') || 'light');
    </script>
</body>
</html>
