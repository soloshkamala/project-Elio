<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Мої обрані</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fdfcfb; font-family: sans-serif; }
        .back-link { color: #888; text-decoration: none; font-size: 0.9rem; font-weight: 600; }
        .back-link:hover { color: #ff8a80; }
        .fav-title { font-weight: 900; color: #333; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container pt-4 pb-5">
        <a href="{% url 'advice_list' %}" class="back-link">← Назад до всіх порад</a>

        <h1 class="fav-title mb-4">❤️ Мої обрані поради</h1>

        <div class="row g-3">
            {% for article in favorites %}
            <div class="col-6 col-md-4">
                <div class="card border-0 shadow-sm" style="background-color: {{ article.card_color }}; border-radius: 20px; min-height: 120px;">
                    <div class="card-body d-flex flex-column justify-content-center text-center">
                        <h5 style="font-weight: 700; margin: 0;">{{ article.title }}</h5>
                        <p class="small text-muted mt-2">{{ article.content }}</p>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12 text-center mt-5">
                <p class="text-muted">Тут поки порожньо. Додайте щось цікаве!</p>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
