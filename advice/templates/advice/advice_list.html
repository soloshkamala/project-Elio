<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Поради та вправи</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #ffffff; font-family: sans-serif; }
        .section-title { font-weight: 800; margin-top: 30px; margin-bottom: 20px; }
        .custom-card { border: none; border-radius: 20px; min-height: 100px; transition: 0.3s; cursor: pointer; }
        .custom-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1) !important; }
        .btn-fav { background-color: #ff8a80; color: white; border-radius: 25px; padding: 8px 20px; text-decoration: none; font-weight: 600; display: inline-block; }
        a { text-decoration: none; color: inherit; }
    </style>
</head>
<body>
    <div class="container pb-5">
        <div class="text-center mt-5 mb-4">
            <h1 style="font-weight: 900;">Поради для вас</h1>
            <a href="{% url 'favorite_list' %}" class="btn-fav mt-3">❤️ Моє обране</a>
        </div>

        <h2 class="section-title">Сьогоднішня добірка</h2>
        <div class="row g-3">
            {% for article in advices %}
            <div class="col-6 col-md-4">
                <a href="{% url 'article_detail' article.pk %}">
                    <div class="card custom-card shadow-sm" style="background-color: {{ article.card_color }};">
                        <div class="card-body d-flex align-items-center justify-content-center text-center">
                            <h5 style="font-weight: 700; margin: 0;">{{ article.title }}</h5>
                        </div>
                    </div>
                </a>
            </div>
            {% endfor %}
        </div>

        <h2 class="section-title">Вправи</h2>
        <div class="row g-3">
            {% for exercise in exercises %}
            <div class="col-6 col-md-4">
                <a href="{% url 'article_detail' exercise.pk %}">
                    <div class="card custom-card shadow-sm" style="background-color: {{ exercise.card_color }};">
                        <div class="card-body d-flex align-items-center justify-content-center text-center">
                            <h5 style="font-weight: 700; margin: 0;">{{ exercise.title }}</h5>
                        </div>
                    </div>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
