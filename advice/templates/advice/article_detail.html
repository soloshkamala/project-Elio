{% load static %}
<!DOCTYPE html>
<html lang="uk" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ article.title }} — Elio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --bg-elio: #fdf6f0; --accent-pink: #ff9a9e; --text-dark: #2d3436; }
        [data-bs-theme="dark"] { --bg-elio: #1e1e2e; --text-dark: #f5f5f5; }
        body { font-family: 'Nunito', sans-serif; background-color: var(--bg-elio); color: var(--text-dark); transition: 0.3s ease; }

        .navbar-brand img { width: 45px; height: 45px; margin-right: 10px; }

        .reading-card { background: white; border-radius: 35px; padding: 50px; border: none; box-shadow: 0 15px 40px rgba(0,0,0,0.05); position: relative; overflow: hidden; }
        [data-bs-theme="dark"] .reading-card { background: #2b2b3d; box-shadow: 0 15px 40px rgba(0,0,0,0.2); }

        .card-accent-line { position: absolute; top: 0; left: 0; width: 100%; height: 8px; background-color: {{ article.card_color }}; }

        .back-link { font-weight: 700; color: var(--text-dark); text-decoration: none; transition: 0.2s; }
        .back-link:hover { color: var(--accent-pink); }

        .content-text { font-size: 1.15rem; line-height: 1.8; opacity: 0.9; }

        .btn-fav-large {
            background: transparent; border: 3px solid var(--accent-pink); color: var(--accent-pink);
            font-weight: 800; padding: 15px 40px; border-radius: 20px; transition: 0.3s;
            text-decoration: none; display: inline-flex; align-items: center; gap: 10px; font-size: 1.2rem;
        }
        .btn-fav-large:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255, 154, 158, 0.3); }
        .btn-fav-large.active { background: linear-gradient(45deg, #ff9a9e, #fad0c4); color: white; border-color: transparent; }

        .theme-toggle { position: fixed; bottom: 30px; right: 30px; width: 55px; height: 55px; border-radius: 50%; background: white; border: 2px solid #ddd; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; font-size: 1.5rem; transition: 0.3s; }
        [data-bs-theme="dark"] .theme-toggle { background: #2b2b3d; border-color: #444; }
    </style>
</head>
<body>

    <div id="themeBtn" class="theme-toggle shadow"><i class="bi bi-moon-fill" id="themeIcon"></i></div>

    <nav class="navbar navbar-expand-lg py-3">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="{% url 'home' %}">
                <img src="{% static 'logo.png' %}" alt="Elio">
                Elio
            </a>
            <div class="ms-auto d-flex align-items-center gap-4">
                <a href="{% url 'home' %}" class="back-link">
                    <i class="bi bi-house-door-fill" style="color: var(--accent-pink);"></i> Головна
                </a>
                <a href="{% url 'advice_list' %}" class="back-link"><i class="bi bi-arrow-left"></i> Назад до порад</a>
            </div>
        </div>
    </nav>

    <main class="container py-4" style="max-width: 800px;">
        <div class="reading-card mb-5">
            <div class="card-accent-line"></div>

            <div class="text-center mb-5">
                <span class="badge rounded-pill mb-3 px-3 py-2" style="background-color: {{ article.card_color }}33; color: {{ article.card_color }}; font-size: 0.9rem;">
                    {{ article.get_category_display }}
                </span>
                <h1 class="fw-black" style="font-weight: 900; font-size: 2.5rem;">{{ article.title }}</h1>
            </div>

            <div class="content-text mb-5">
                {{ article.content|linebreaks }}
            </div>

            <div class="text-center mt-5 pt-4 border-top">
                <a href="{% url 'toggle_favorite' article.pk %}" class="btn-fav-large {% if is_fav %}active{% endif %}">
                    {% if is_fav %}
                        <i class="bi bi-heart-fill"></i> Вже в обраному
                    {% else %}
                        <i class="bi bi-heart"></i> Додати в обране
                    {% endif %}
                </a>
            </div>
        </div>
    </main>

    <script>
        (function() {
            const savedTheme = localStorage.getItem('elio-theme') || 'light';
            document.documentElement.setAttribute('data-bs-theme', savedTheme);
        })();

        const btn = document.getElementById('themeBtn');
        const icon = document.getElementById('themeIcon');
        const html = document.documentElement;

        btn.onclick = () => {
            const theme = html.getAttribute('data-bs-theme');
            const newTheme = theme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-bs-theme', newTheme);
            icon.className = newTheme === 'light' ? 'bi bi-moon-fill' : 'bi bi-sun-fill';
            localStorage.setItem('elio-theme', newTheme);
        };

        const saved = localStorage.getItem('elio-theme');
        if(saved) {
            icon.className = saved === 'light' ? 'bi bi-moon-fill' : 'bi bi-sun-fill';
        }
    </script>
</body>
</html>
