<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{{ article.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { transition: 0.5s; font-family: sans-serif; }
        .detail-container { max-width: 600px; margin-top: 10vh; }
        .main-card { border: none; border-radius: 35px; background: white; padding: 40px; box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        .back-btn { text-decoration: none; color: #555; font-weight: 600; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body style="background-color: {{ article.card_color }};">
    <div class="container detail-container">
        <a href="{% url 'advice_list' %}" class="back-btn">← Назад до списку</a>

        <div class="main-card text-center">
            <p class="text-uppercase small fw-bold text-muted" style="letter-spacing: 1px;">
                {{ article.get_category_display }}
            </p>
            <h1 style="font-weight: 850; color: #333;">{{ article.title }}</h1>
            <hr style="width: 50px; margin: 25px auto; border-top: 3px solid {{ article.card_color }};">
            <p class="mt-4" style="font-size: 1.1rem; line-height: 1.6; color: #555;">
                {{ article.content }}
            </p>
        </div>
    </div>
</body>
</html>
