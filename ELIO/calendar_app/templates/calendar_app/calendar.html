<!DOCTYPE html>
<html>
<head>
    <title>Elio - Ментальне здоров'я</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #4a90e2; }

        /* Контейнер для карток місяців */
        .months-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }

        .month-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 300px; }
        .month-title { text-align: center; font-weight: bold; margin-bottom: 15px; color: #333; }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day-name { font-size: 12px; font-weight: bold; color: #adb5bd; padding-bottom: 10px; }

        .day { padding: 10px 0; border-radius: 10px; border: 1px solid #f8f9fa; cursor: pointer; transition: 0.2s; }
        .day:hover:not(.empty) { background-color: #e3f2fd; border-color: #4a90e2; }
        .empty { border: none; color: transparent; cursor: default; }

        /* Стилі для ШТОРКИ (Drawer) */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 998; }

        .drawer {
            position: fixed; bottom: -100%; left: 0; width: 100%;
            background: white; border-radius: 30px 30px 0 0;
            padding: 30px; box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
            transition: 0.4s ease-out; z-index: 999; text-align: center;
        }
        .drawer.active { bottom: 0; }
        .overlay.active { display: block; }

        .emoji-list { display: flex; justify-content: center; gap: 25px; margin: 20px 0; font-size: 45px; }
        .emoji-item { cursor: pointer; transition: 0.2s; }
        .emoji-item:hover { transform: scale(1.3); }

        .close-btn { background: #f1f3f5; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; color: #666; }
    </style>
</head>
<body>

    <h1>Мій стан Elio</h1>

    <div class="months-container">
        {% for month in months %}
        <div class="month-card">
            <div class="month-title">{{ month.name }} {{ month.year }}</div>
            <div class="grid">
                <div class="day-name">Пн</div><div class="day-name">Вт</div><div class="day-name">Ср</div>
                <div class="day-name">Чт</div><div class="day-name">Пт</div><div class="day-name">Сб</div><div class="day-name">Нд</div>

                {% for week in month.weeks %}
                    {% for day in week %}
                        <div class="day {% if day == 0 %}empty{% endif %}"
                             onclick="openDrawer('{{ day }}', '{{ month.name }}')">
                            {% if day != 0 %}{{ day }}{% endif %}
                        </div>
                    {% endfor %}
                {% endfor %}
            </div>
        </div>
        {% endfor %}
    </div>

    <div class="overlay" id="overlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer">
        <h3 id="drawer-date">Як ви почуваєтесь?</h3>
        <div class="emoji-list">
            <span class="emoji-item" onclick="selectMood('✨')">✨</span>
            <span class="emoji-item" onclick="selectMood('😊')">😊</span>
            <span class="emoji-item" onclick="selectMood('😐')">😐</span>
            <span class="emoji-item" onclick="selectMood('😔')">😔</span>
            <span class="emoji-item" onclick="selectMood('😫')">😫</span>
        </div>
        <button class="close-btn" onclick="closeDrawer()">Скасувати</button>
    </div>

    <script>
        function openDrawer(day, month) {
            if (day === '0') return;
            document.getElementById('drawer-date').innerText = "Який ваш стан " + day + " " + month + "?";
            document.getElementById('drawer').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }

        function closeDrawer() {
            document.getElementById('drawer').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        function selectMood(emoji) {
            alert("Ваш стан збережено: " + emoji);
            closeDrawer();
        }
    </script>

</body>
</html>
