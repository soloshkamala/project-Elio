{% load static %}
<!DOCTYPE html>
<html lang="uk" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Налаштування — ELIO</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <script>
        (function() {
            const saved = localStorage.getItem('elio-theme') || 'light';
            document.documentElement.setAttribute('data-bs-theme', saved);
        })();
    </script>

    <style>
        :root { --accent: #7b61ff; --bg: #fdf6f0; --card-bg: rgba(255, 255, 255, 0.9); }
        [data-bs-theme="dark"] { --bg: #1e1e2e; --card-bg: #2b2b3d; }

        body { background-color: var(--bg); font-family: 'Nunito', sans-serif; padding: 20px 0; transition: 0.3s; }

        .settings-container { max-width: 600px; margin: 0 auto; padding: 0 15px; }

        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .back-btn { color: var(--accent); text-decoration: none; font-weight: bold; font-size: 1.1rem; }
        .theme-toggle { background: var(--card-bg); border: none; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; color: inherit; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .menu-card {
            background: var(--card-bg); border-radius: 20px; padding: 20px;
            display: flex; align-items: center; gap: 15px; margin-bottom: 15px;
            text-decoration: none; color: inherit; font-weight: bold; font-size: 1.1rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.02); transition: 0.3s; border: 2px solid transparent;
        }
        .menu-card:hover { transform: translateY(-3px); border-color: rgba(123, 97, 255, 0.3); }

        .icon-box { width: 50px; height: 50px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .icon-profile { background: rgba(123, 97, 255, 0.1); color: #7b61ff; }
        .icon-charts { background: rgba(40, 167, 69, 0.1); color: #28a745; }
        .icon-reminders { background: rgba(23, 162, 184, 0.1); color: #17a2b8; }
        .icon-premium { background: rgba(255, 193, 7, 0.1); color: #ffc107; border: 2px solid #ffc107; }

        .chevron { margin-left: auto; color: #aaa; }
    </style>
</head>
<body>

    <div class="settings-container">
        <header class="header-bar">
            <a href="{% url 'user_home' %}" class="back-btn"><i class="bi bi-arrow-left me-1"></i> Головна</a>
            <h2 class="fw-black m-0 text-center flex-grow-1">Налаштування</h2>
            <button id="themeBtn" class="theme-toggle"><i class="bi bi-moon-fill"></i></button>
        </header>

        <nav class="settings-nav">
            <a href="{% url 'my_profile' %}" class="menu-card">
                <div class="icon-box icon-profile"><i class="bi bi-person-fill"></i></div>
                Особисті дані
                <i class="bi bi-chevron-right chevron"></i>
            </a>
            <a href="{% url 'charts_reports' %}" class="menu-card">
                <div class="icon-box icon-charts"><i class="bi bi-bar-chart-fill"></i></div>
                Графіки та звіти
                <i class="bi bi-chevron-right chevron"></i>
            </a>
            <a href="{% url 'reminders' %}" class="menu-card">
                <div class="icon-box icon-reminders"><i class="bi bi-bell-fill"></i></div>
                Нагадування
                <i class="bi bi-chevron-right chevron"></i>
            </a>
            <a href="{% url 'premium' %}" class="menu-card mt-4">
                <div class="icon-box icon-premium"><i class="bi bi-star-fill"></i></div>
                <div>
                    Преміум підписка
                    <div class="small text-muted fw-normal">Розширити можливості</div>
                </div>
                <i class="bi bi-chevron-right chevron"></i>
            </a>
        </nav>
    </div>

    <script>
        const btn = document.getElementById('themeBtn');
        const icon = btn.querySelector('i');
        const html = document.documentElement;

        function updateIcon(theme) { icon.className = theme === 'light' ? 'bi bi-moon-fill' : 'bi bi-sun-fill'; }

        btn.onclick = () => {
            const target = html.getAttribute('data-bs-theme') === 'light' ? 'dark' : 'light';
            html.setAttribute('data-bs-theme', target);
            localStorage.setItem('elio-theme', target);
            updateIcon(target);
        };
        updateIcon(localStorage.getItem('elio-theme') || 'light');
    </script>
</body>
</html>
