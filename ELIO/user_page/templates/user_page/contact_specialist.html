<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Зв'язок зі спеціалістом</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body style="background-color: #fdf6f0; font-family: 'Nunito', sans-serif;">
    <div class="container py-5 text-center">
        <div class="text-start mb-4">
            <a href="{% url 'specialists' %}" class="btn btn-outline-secondary rounded-pill">⬅ Назад до списку</a>
        </div>

        <div class="card p-5 border-0 shadow-sm rounded-4 mx-auto" style="max-width: 600px;">
            <h2 class="fw-bold mb-3">Зв'язок з психологом</h2>
            <h4 style="color: #dcb0ff;">{% if psychologist.first_name %}{{ psychologist.first_name }} {{ psychologist.last_name }}{% else %}{{ psychologist.username }}{% endif %}</h4>
            <hr class="my-4">
            <p class="fs-5 text-muted">Тут ми зможемо додати форму для повідомлень, чат або календар для запису на сеанс.</p>
        </div>
    </div>
</body>
</html>
