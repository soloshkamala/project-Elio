{% load static %}
<!DOCTYPE html>
<html lang="uk" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Зміна пароля — Elio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-elio: #fdf6f0; --accent-pink: #ff9a9e; --text-dark: #2d3436; }
        [data-bs-theme="dark"] { --bg-elio: #1e1e2e; --text-dark: #f5f5f5; }
        body { font-family: 'Nunito', sans-serif; background-color: var(--bg-elio); color: var(--text-dark); padding: 40px 0; }
        .feature-card { background: white; border-radius: 25px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 500px; margin: 0 auto; }
        [data-bs-theme="dark"] .feature-card { background: #2b2b3d; }
        .form-control { border-radius: 15px; padding: 12px 45px; background: var(--bg-elio); border: 2px solid transparent; color: var(--text-dark); font-weight: 700; width: 100%; }
        .form-control:focus { border-color: var(--accent-pink); outline: none; box-shadow: 0 0 0 4px rgba(255, 154, 158, 0.15); }
        .input-group-custom { position: relative; margin-bottom: 20px; }
        .input-group-custom i { position: absolute; left: 15px; top: 12px; opacity: 0.5; font-size: 1.2rem; z-index: 5; }
        .btn-main { background: linear-gradient(45deg, #ff9a9e, #fad0c4); border: none; color: white; font-weight: 800; padding: 15px; border-radius: 15px; width: 100%; transition: 0.3s; }
        .error-msg { color: #dc3545; font-size: 0.8rem; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container text-center">
        <header class="mb-4 d-flex justify-content-start">
             <a href="{% url 'my_profile' %}" class="btn btn-light rounded-pill px-4 fw-bold">← Назад</a>
        </header>

        <div class="feature-card">
            <h3 class="fw-black mb-4">Новий пароль</h3>
            <form method="POST">
                {% csrf_token %}

                {% for field in form %}
                <div class="input-group-custom text-start">
                    <label class="small fw-bold mb-1 ms-2 opacity-75">{{ field.label }}</label>
                    <i class="bi bi-shield-lock-fill"></i>
                    <input type="{{ field.field.widget.input_type }}"
                           name="{{ field.html_name }}"
                           class="form-control"
                           placeholder="••••••••">
                    {% if field.errors %}
                        <div class="error-msg ms-2">{{ field.errors.0 }}</div>
                    {% endif %}
                </div>
                {% endfor %}

                <button type="submit" class="btn-main mt-3">Оновити пароль</button>
            </form>
        </div>
    </div>
    <script>document.documentElement.setAttribute('data-bs-theme', localStorage.getItem('elio-theme') || 'light');</script>
</body>
</html>
