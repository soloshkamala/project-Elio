{% load static %}
<!DOCTYPE html>
<html lang="uk" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Elio Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">
    <div class="container border rounded p-4 shadow-sm" style="max-width: 800px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Панель керування (Hub)</h1>
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger btn-sm">Вийти ({{ user.username }})</button>
            </form>
        </div>

        <div class="row g-3">
            <!-- КНОПКИ ДЛЯ КОМАНДИ -->
            <div class="col-md-4">
                <a href="/calendar/" class="btn btn-outline-primary w-100 py-4">📅 Календар</a>
            </div>
            <div class="col-md-4">
                <a href="/advice/" class="btn btn-outline-success w-100 py-4">💡 Поради</a>
            </div>
            <div class="col-md-4">
                <a href="/profile/" class="btn btn-outline-warning w-100 py-4">👤 Профіль</a>
            </div>
        </div>
    </div>
</body>
</html>
